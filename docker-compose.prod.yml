version: "3.8"
services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8000/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always
    labels:
      - traefik.http.routers.backend.rule=Host(`api.td-rss.ru`)
      - traefik.http.routers.backend.entrypoints=web
      - traefik.http.services.backend.loadbalancer.server.port=8000
      - traefik.http.routers.backend.service=backend
      - traefik.http.routers.backend.middlewares=redirect-to-https@file
      - traefik.http.routers.backend-secure.rule=Host(`api.td-rss.ru`)
      - traefik.http.routers.backend-secure.entrypoints=websecure
      - traefik.http.services.backend-secure.loadbalancer.server.port=8000
      - traefik.http.routers.backend-secure.service=backend-secure
      - traefik.http.routers.backend-secure.tls.certresolver=letsencrypt
      - traefik.docker.network=dokploy-network
      - traefik.enable=true
    networks:
      - dokploy-network
      - default
  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    env_file:
      - .env
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BACKEND_URL=http://backend:8000
      - PYTHONPATH=/app
    depends_on:
      - backend
    restart: always
    networks:
      - dokploy-network
  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: https://api.td-rss.ru
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=https://api.td-rss.ru
      - BACKEND_URL=http://backend:8000
      - PORT=3000
    restart: always
    labels:
      - traefik.http.routers.frontend.rule=Host(`td-rss.ru`) || Host(`www.td-rss.ru`) || Host(`tdrusstankosbyt.ru`) || Host(`www.tdrusstankosbyt.ru`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.services.frontend.loadbalancer.server.port=3000
      - traefik.http.routers.frontend.service=frontend
      - traefik.http.routers.frontend.middlewares=redirect-to-https@file
      - traefik.http.routers.frontend-secure.rule=Host(`td-rss.ru`) || Host(`www.td-rss.ru`) || Host(`tdrusstankosbyt.ru`) || Host(`www.tdrusstankosbyt.ru`)
      - traefik.http.routers.frontend-secure.entrypoints=websecure
      - traefik.http.services.frontend-secure.loadbalancer.server.port=3000
      - traefik.http.routers.frontend-secure.service=frontend-secure
      - traefik.http.routers.frontend-secure.tls.certresolver=letsencrypt
      - traefik.docker.network=dokploy-network
      - traefik.enable=true
    networks:
      - dokploy-network
      - default
  db:
    image: ankane/pgvector
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always
    networks:
      - dokploy-network
  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - dokploy-network
  directus:
    image: directus/directus:latest
    volumes:
      - directus_uploads:/directus/uploads
      - ./infra/directus/extensions:/directus/extensions
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      PUBLIC_URL: https://admin.td-rss.ru
      REFRESH_TOKEN_COOKIE_SECURE: "true"
      REFRESH_TOKEN_COOKIE_SAME_SITE: None
      DB_CLIENT: pg
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CORS_ENABLED: "true"
      CACHE_ENABLED: "false"
      WEBSOCKETS_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    restart: always
    labels:
      - traefik.http.routers.directus.rule=Host(`admin.td-rss.ru`)
      - traefik.http.routers.directus.entrypoints=web
      - traefik.http.services.directus.loadbalancer.server.port=8055
      - traefik.http.routers.directus.service=directus
      - traefik.http.routers.directus.middlewares=redirect-to-https@file
      - traefik.http.routers.directus-secure.rule=Host(`admin.td-rss.ru`)
      - traefik.http.routers.directus-secure.entrypoints=websecure
      - traefik.http.services.directus-secure.loadbalancer.server.port=8055
      - traefik.http.routers.directus-secure.service=directus-secure
      - traefik.http.routers.directus-secure.tls.certresolver=letsencrypt
      - traefik.docker.network=dokploy-network
      - traefik.enable=true
    networks:
      - dokploy-network
      - default
volumes:
  db_data:
  redis_data:
  directus_uploads:
networks:
  dokploy-network:
    external: true
